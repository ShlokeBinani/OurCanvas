<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Our Canvas</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Our Canvas">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/104/104530.png">
</head>
<body>

  <canvas id="paintBoard"></canvas>
  <canvas id="fxBoard"></canvas>

  <div id="chatBox" class="chat-box"></div>

  <div class="controls">
    <label for="photoInput" class="btn-icon">
      📷
      <input type="file" id="photoInput" accept="image/*" style="display:none;">
    </label>
    <input type="text" id="textInput" placeholder="Type a secret message..." autocomplete="off">
    <button id="sendTextBtn">Send</button>
    <button id="clearBtn">Clear</button>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
